name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    env:
      # Placeholder env for build/typecheck — no real service connection;
      # live TJU fetching requires campus network and is not run in CI.
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Reads pnpm version from packageManager field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
