name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest

    env:
      # Placeholder env for build/typecheck — no real service connection;
      # live TJU fetching requires campus network and is not run in CI.
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Reads pnpm version from packageManager field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # Do NOT use cache: pnpm here — pnpm 9 changed "pnpm store path"
          # to require package arguments, which breaks setup-node's cache probe.
          # We cache the store manually below instead.

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm config get store-dir)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
