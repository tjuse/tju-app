name: Release

# A single version tag (e.g. `v0.1.0`) cuts one release covering BOTH the
# tju.app web dashboard and the TJU App Bridge extension: the notes come from
# the matching CHANGELOG.md section, and the built extension zip is attached as
# a downloadable asset. (The web app itself deploys from main on Netlify/Vercel;
# the tag marks the version and ships the extension + unified changelog.)
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build · Package · Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # Reads pnpm version from the packageManager field in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension
        run: pnpm --filter @tju-app/extension build

      - name: Package extension
        id: package
        run: |
          version="${GITHUB_REF_NAME#v}"
          out="tju-app-extension-${version}.zip"
          staging="$(mktemp -d)"
          cp manifest.json popup.html "$staging/"
          cp -r dist "$staging/dist"
          (cd "$staging" && zip -r "$OLDPWD/$out" .)
          echo "zip=$out" >> "$GITHUB_OUTPUT"
        working-directory: packages/extension

      - name: Extract changelog section
        run: |
          notes="$(awk -v h="## $GITHUB_REF_NAME" \
            'index($0,h)==1{f=1;next} /^## /&&f{f=0} f' CHANGELOG.md)"
          if [ -z "$notes" ]; then
            notes="See CHANGELOG.md."
          fi
          {
            echo "$notes"
            echo ""
            echo "---"
            echo "**Browser extension:** download the attached \`tju-app-extension-*.zip\`, unzip it, then load it via chrome://extensions → 开发者模式 → 加载已解压的扩展程序. You must be logged into TJU EAMS in the same browser."
          } > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "packages/extension/${{ steps.package.outputs.zip }}" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
