version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tju_app_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tju_user
      POSTGRES_PASSWORD: tju_pass
      POSTGRES_DB: tju_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tju_user -d tju_app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
